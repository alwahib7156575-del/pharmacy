name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تنزيل المشروع
        uses: actions/checkout@v4

      - name: ضغط ملفات التطبيق
        run: |
          mkdir output
          zip -r output/AlShifa-App.zip . \
            -x ".git/*" \
            -x ".github/*"

      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: AlShifa-App
          path: output/AlShifa-App.zip
